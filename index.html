answer it.":`لا تُجب عليه.`,"Do not move the cursor.":`لا تحرّك المؤشر.`,"Hold the button until the bar is full.":`امسك الزرّ حتى يمتلئ الشريط.`,"Press and HOLD the button. Let go at your number of seconds.":`اضغط وامسك الزرّ. أفلِته عند عدد ثوانيك.`,"Now let go when the timer reaches your number.":`الآن أفلِت عندما يبلغ المؤقّت رقمك.`,"Remember this button.":`تذكّر هذا الزرّ.`,"Remember this number.":`تذكّر هذا الرقم.`,"Trace the path to the goal. Do not leave the corridor.":`تتبّع المسار إلى الهدف. لا تخرج من الممر.`,"Rebuild the silhouette from the pieces.":`أعد بناء الظل من القطع.`,"Build the shape from the pieces.":`ابنِ الشكل من القطع.`,"The next statement is a lie.":`الجملة التالية كذبة.`,"Do not click the button.":`لا تنقر الزرّ.`,"Not the buttons.":`ليس الأزرار.`,"Wait.":`انتظر.`,"Now you may click.":`الآن يمكنك النقر.`,"Go ahead. Click it.":`تفضّل. انقره.`,"Figure it out.":`اكتشفها بنفسك.`,"Watch the order.":`راقب الترتيب.`,"It hides fast. Click it.":`إنه يختبئ بسرعة. انقره.`,"move your cursor onto START":`حرّك المؤشر إلى «البداية»`,START:`البداية`,GOAL:`النهاية`,COUNTER:`العدّاد`,FULL:`ممتلئ`,COMPLETE:`اكتمل`,LOCKED:`مقفل`,OK:`حسنًا`,GO:`انطلق`,STOP:`قف`,"NOT A BUTTON":`لستُ زرًّا`,"FREE POINTS":`نقاط مجانية`,"TAP TO CONTINUE":`اضغط للمتابعة`,CONTINUE:`متابعة`,"MOVE HERE":`تحرّك إلى هنا`,"THE BUTTON":`الزرّ`,"wait for it":`انتظرها`,NOW:`الآن`,notice:`تنبيه`,"in the middle":`في الوسط`,"on the left":`على اليسار`,"on the right":`على اليمين`,"the larger one":`الأكبر`,"the smaller one":`الأصغر`,"Delete all save data?":`حذف كل بيانات الحفظ؟`,"Grant admin privileges?":`منح صلاحيات المشرف؟`,"Report this player for suspicious clicking?":`الإبلاغ عن هذا اللاعب بسبب نقرات مريبة؟`,"Your save was never in danger.":`ملف حفظك لم يكن في خطر قط.`,"No privileges were ever on the table.":`لم تكن هناك صلاحيات مطروحة أصلًا.`,"No report was ever going to be filed.":`لم يكن أي بلاغ سيُقدَّم.`,"...access unchanged. As you were.":`...الصلاحيات كما هي. تابع.`,"...fine. I kept it.":`...حسنًا. احتفظت به.`,"...report discarded. You were never here.":`...أُتلف البلاغ. لم تكن هنا قط.`,"LEVEL COMPLETE — OK!":`اكتمل المستوى — حسنًا!`,"Your rabbit has 1 new message — OK":`لديك إشعار جديد (١) — حسنًا`,GENERIC_DEATH:`GENERIC_DEATH`,"A brand-new rule and a tiny task, and you ran out the clock on both.":`قاعدة جديدة ومهمة صغيرة، وأضعتَ الوقت في كلتيهما.`,"A button wrote NOT A BUTTON on itself and you took its word for it. It cannot even hold a pen.":`زرّ كتب على نفسه «لستُ زرًّا» فصدّقته. إنه لا يستطيع حتى مسك القلم.`,"A decorative banner said TAP TO CONTINUE, so you tapped. The instruction is the only thing in this room that loves you, and you traded it for a chip.":`لافتة زخرفية قالت «اضغط للمتابعة» فضغطت. التعليمات هي الوحيدة التي تحبك في هذه الغرفة، وبِعتَها بلافتة.`,"A label said the magic word and you believed it on the spot. Shapes do not fill out their own name tags.":`ملصق قال الكلمة السحرية فصدّقته فورًا. الأشكال لا تكتب بطاقات أسمائها بنفسها.`,"A liar quoted a liar and you audited neither.":`كذّاب اقتبس عن كذّاب وأنت لم تدقّق في أيٍّ منهما.`,"A real scan takes half a second. You skipped it.":`المسح الحقيقي يستغرق نصف ثانية. وأنت تجاوزته.`,"A thousand clicks and you budgeted zero.":`ألف نقرة وأنت رصدت لها صفرًا.`,"All that time, and the memory just packed a bag and left while you hovered.":`كل هذا الوقت، والذاكرة حزمت حقيبتها ورحلت وأنت تحوم.`,"Any of eight right answers. You treated it like defusing a bomb and still lost.":`ثمانية أجوبة صحيحة متاحة. تعاملتَ معها كتفكيك قنبلة وخسرت رغم ذلك.`,"Both memories intact, and the addition still got you.":`الذاكرتان سليمتان، ومع ذلك أوقعك الجمع.`,"Commitment is lovely. Release was the assignment.":`الالتزام جميل. لكن المطلوب كان الإفلات.`,"Counting to a small number, no pressure, all the time in the world. And yet, here we are.":`العدّ إلى رقم صغير، بلا ضغط، وبكل وقت الدنيا. ومع ذلك، ها نحن هنا.`,"Deja vu is not evidence. Reading is evidence.":`الديجافو ليس دليلًا. القراءة هي الدليل.`,"Eager. You reached for the other button a round too soon. Wrong kind of pattern-breaking.":`متحمّس. مددت يدك إلى الزرّ الآخر قبل جولته. كسرُ نمطٍ في غير محله.`,"Eight clean exits and you walked into the one door with your own number on it.":`ثمانية مخارج آمنة، فدخلت الباب الوحيد الذي يحمل رقمك.`,"Eight safe numbers, all patient. You stared them down until the clock blinked first.":`ثمانية أرقام آمنة، كلها صبورة. حدّقت فيها حتى رمش المؤقّت أولًا.`,"Fireworks are not a clock. The real one was on the wall, draining, ignored.":`الألعاب النارية ليست ساعة. الساعة الحقيقية كانت على الجدار، تنزف، متجاهَلة.`,"Four buttons, one queue, thirteen seconds. The queue outlived you.":`أربعة أزرار، طابور واحد، ثلاث عشرة ثانية. عاش الطابور أطول منك.`,"Four little rounds. You turned it into a hostage negotiation and still lost.":`أربع جولات صغيرة. حوّلتها إلى مفاوضات رهائن وخسرت رغم ذلك.`,"He ran, he stopped, he smiled.":`ركض، توقف، وابتسم.`,"I would explain geometry to you, but you would probably click that too.":`كنت سأشرح لك الهندسة، لكنك على الأرجح ستنقر عليها أيضًا.`,"It asked for one click. One. You gave it a staring contest.":`طلب نقرة واحدة. واحدة. فأعطيته مسابقة تحديق.`,"It blinked. It waited. It gave up on you, which is more than I would have done.":`ومض. انتظر. ثم يئس منك، وهذا أكثر مما كنت سأفعله أنا.`,"It is not even a fast one. You had options. You chose crime.":`إنه ليس سريعًا حتى. كانت لديك خيارات. واخترت الجريمة.`,"It looked almost right. Almost is how they get you.":`بدا صحيحًا تقريبًا. و«تقريبًا» هي طريقتهم للإيقاع بك.`,"It perched. It posed. It left. You were saving that click for a special occasion?":`حطّت. تبخترت. رحلت. أكنتَ تدّخر تلك النقرة لمناسبة خاصة؟`,"It practiced its escape for nothing. You never even swung.":`تدرّب على الهرب بلا داعٍ. أنت لم تحاول أصلًا.`,"It remembers every visit. You were there for all of them.":`إنه يتذكر كل زيارة. وأنت كنت حاضرًا فيها كلها.`,"It sat there specifically to see if you would. You would.":`جلس هناك خصيصًا ليرى إن كنت ستفعلها. وفعلتها.`,"It told you a colour in big friendly letters and you never checked the actual paint.":`أخبرك بلونٍ بحروف كبيرة ودودة، وأنت لم تتحقق من الطلاء الفعلي قط.`,"It waited. It only ever wanted the one. You gave it nothing.":`انتظر. لم يرد سوى واحدة. فلم تعطه شيئًا.`,"It wanders everywhere except seven. You waited beautifully — oh. You clicked.":`إنه يتجول في كل مكان إلا السبعة. انتظرت بشكل رائع — أوه. لقد نقرت.`,"It was RIGHT THERE. Majestic. Unmissable. Clicked through.":`كان هناك تمامًا. مهيبًا. لا يمكن تفويته. ونقرت من خلاله.`,"It was full. Gloriously, honestly full. You admired it to death.":`كان ممتلئًا. ممتلئًا بمجدٍ وصدق. فتأملته حتى الموت.`,"It was running in circles the entire time. So, frankly, were you.":`كان يدور في حلقات طوال الوقت. وأنت أيضًا، بصراحة.`,"It was your number. It was always your number. You blinked first.":`كان رقمك. كان رقمك دائمًا. لكنك رمشت أولًا.`,"It waved. You clicked anyway. It is telling its family about you right now.":`لوّح لك. ونقرت رغم ذلك. إنه يحكي لعائلته عنك الآن.`,"Muscle memory beat reading comprehension, and it was not close. The instruction was right there, in full.":`ذاكرة العضلات هزمت فهم المقروء، ولم تكن منافسة متقاربة. التعليمات كانت هناك، كاملة.`,"Nine words. One finger. Twelve seconds. The maths was on your side.":`تسع كلمات. إصبع واحد. اثنتا عشرة ثانية. الحساب كان في صفّك.`,"No typo this time — you just lost the count. Not everything needs correcting.":`لا خطأ مطبعيًا هذه المرة — أنت فقط أضعت العدّ. ليس كل شيء يحتاج تصحيحًا.`,"ONCE. It is a small word. It was on the screen a moment ago.":`واحدة. كلمة صغيرة. كانت على الشاشة قبل لحظة.`,"ONCE. One. Uno. The rule has a single word in it and the word is a number.":`واحدة. One. Uno. القاعدة فيها كلمة واحدة وهي رقم.`,"Off by a digit, off by a memory. It was on that screen a few levels ago.":`أخطأت برقم، أخطأت بذاكرة. كان على تلك الشاشة قبل بضعة مستويات.`,"One blink, two clicks. Enthusiasm is not the same as rhythm.":`ومضة واحدة، نقرتان. الحماسة ليست إيقاعًا.`,"One click too many. Or one too few. Either way you landed on the side with the fence.":`نقرة زائدة. أو ناقصة. في الحالتين هبطت في الجهة المسيَّجة.`,"One job: be furniture. The orb wandered off and took your cursor with it like a duckling.":`مهمة واحدة: كن قطعة أثاث. الكرة تجولت وأخذت مؤشرك خلفها كفرخ بطة.`,'One little "not" flips the whole sentence, and you walked right into it.':`كلمة «لا» صغيرة تقلب الجملة كلها، ومشيت إليها مباشرة.`,"One number to carry across a few rooms and it slipped out of your pocket on the way.":`رقم واحد تحمله عبر بضع غرف، فانزلق من جيبك في الطريق.`,"One of them was different. You clicked before you looked.":`واحد منها كان مختلفًا. نقرت قبل أن تنظر.`,"One too many.":`واحدة زيادة.`,"Out of bounds. The corridor did not move — your hand did, off a cliff you could see.":`خارج الحدود. الممر لم يتحرك — يدك تحركت، عن جرفٍ كنت تراه.`,"Paint is loud. Ink is law. You obeyed the paint.":`الطلاء صاخب. الحبر قانون. وأنت أطعت الطلاء.`,"Point at each word and count. It works every time. You did not do it.":`أشر إلى كل كلمة وعُدّ. تنجح في كل مرة. وأنت لم تفعلها.`,"Seven came, posed for its portrait, and left. You were budgeting.":`جاءت السبعة، وقفت لصورتها، ورحلت. وأنت كنت تُعدّ الميزانية.`,"Slow and steady still has to actually arrive.":`البطيء الثابت عليه أن يصل فعلًا في النهاية.`,"So close to threading it, and then you took the scenic route straight into the wall.":`كدت تنجزها، ثم اخترت الطريق السياحي مباشرة نحو الجدار.`,"Some rounds it just stays. The rule never said it leaves.":`في بعض الجولات يبقى ببساطة. القاعدة لم تقل قط إنه يغادر.`,"Somewhere in there you invented a verb. Nouns do not act. Neither, apparently, do you.":`في مكان ما اخترعت فعلًا. الأسماء لا تفعل شيئًا. وأنت أيضًا، على ما يبدو.`,"Suspicion is healthy. Paralysis is fatal.":`الشكّ صحي. الشلل قاتل.`,"That button lived on the left its whole life and never once moved left.":`ذلك الزرّ عاش على اليسار طوال حياته ولم يتحرك يسارًا ولو مرة.`,"That number was not seven. It was not even trying to be seven.":`ذلك الرقم لم يكن سبعة. لم يكن يحاول حتى أن يكون سبعة.`,"That side was never the answer yet. You lunged for the plot twist before it arrived.":`تلك الجهة لم تكن الجواب بعد. قفزت نحو المفاجأة قبل وصولها.`,"The answer was spelled out. Literally. In letters.":`الجواب كان مكتوبًا. حرفيًا. بالحروف.`,"The arc emptied. You were still admiring the fireworks.":`القوس فرغ. وأنت ما زلت تتأمل الألعاب النارية.`,"The big number blinked ZERO and you pounced. It cannot keep time to save its life.":`الرقم الكبير ومض بالصفر فانقضضت. إنه لا يعرف ضبط الوقت لينقذ حياته.`,"The button glows, hums, and lies.":`الزرّ يتوهج، يطنّ، ويكذب.`,"The button said GO, so you clicked. The instruction is the only thing in this room that loves you, and you ignored it for a label.":`الزرّ قال «انطلق» فنقرت. التعليمات هي الوحيدة التي تحبك في هذه الغرفة، وتجاهلتها من أجل ملصق.`,"The button waited. Your nerve did not arrive.":`الزرّ انتظر. وشجاعتك لم تصل.`,"The colours were patient. You were not organised. They stayed lonely and you ran out of clock.":`الألوان كانت صبورة. وأنت لم تكن منظمًا. بقيت وحيدة ونفد وقتك.`,"The costume worked. The costume always works. That button printed its own name tag this morning and you validated it.":`التنكّر نجح. التنكّر ينجح دائمًا. ذلك الزرّ طبع بطاقة اسمه صباح اليوم وأنت صادقت عليها.`,"The double sign ate your brain and the clock ate the rest.":`إشارة السالبين أكلت عقلك، والمؤقّت أكل الباقي.`,"The frame waved at you the entire time.":`الإطار كان يلوّح لك طوال الوقت.`,"The house always wins. Especially against people who never place a bet.":`الكازينو يربح دائمًا. خصوصًا ضد من لا يراهنون أصلًا.`,"The lamp did its whole routine. You clapped at the wrong parts.":`المصباح أدّى عرضه كاملًا. وأنت صفّقت في المقاطع الخاطئة.`,"The maths was the easy part. Finishing it was the exam.":`الحساب كان الجزء السهل. إنهاؤه كان الامتحان.`,"The odd one was right there the whole time. So was the clock.":`المختلف كان هناك طوال الوقت. وكذلك المؤقّت.`,"The one digit you were told to guard, and you handed it right back. Habit works for me now.":`الرقم الوحيد الذي طُلب منك حراسته، وسلّمته فورًا. العادة تعمل لصالحي الآن.`,"The orb was a lure. It had somewhere to be. You did not, and you followed it anyway.":`الكرة كانت طُعمًا. كان لديها مكان تقصده. أنت لا، وتبعتها رغم ذلك.`,"The orbs waited. The clock did not.":`الكرات انتظرت. المؤقّت لم ينتظر.`,"The pieces were all there. The picture never happened.":`القطع كانت كلها موجودة. الصورة لم تحدث قط.`,"The recent past defeated you. The RECENT past.":`الماضي القريب هزمك. القريب جدًا.`,"The row outlasted you. The buttons are unionizing now. They elected the impostor as treasurer.":`الصف صمد أكثر منك. الأزرار تؤسس نقابة الآن، وانتخبت المحتال أمينًا للصندوق.`,"The second sentence argued back and you took its side. It was the one on trial.":`الجملة الثانية جادلت وانحزت إليها. وهي التي كانت في قفص الاتهام.`,"The shiny thing does not know you exist. You moved for it regardless. Statues do not chase sparks.":`الشيء اللامع لا يعرف بوجودك. وتحركت نحوه رغم ذلك. التماثيل لا تطارد الشرر.`,"The star waited. The button waited. The clock did not.":`النجمة انتظرت. الزرّ انتظر. المؤقّت لم ينتظر.`,"The verbs sat in plain sight, doing things. That is the whole job of a verb.":`الأفعال جلست على مرأى منك، تفعل أشياء. هذه وظيفة الفعل أصلًا.`,"The word was the costume. The paint was the body. You went and married the costume.":`الكلمة كانت الزيّ. الطلاء كان الجسد. وأنت ذهبت وتزوجت الزيّ.`,"They finished their little walk and stood there. You never picked a walker.":`أنهيا نزهتهما الصغيرة ووقفا هناك. وأنت لم تختر أيًّا منهما.`,"They performed their entrance in single file. You were checking your phone.":`دخلت واحدة تلو الأخرى باصطفاف مثالي. وأنت كنت تتفقد هاتفك.`,"Three of everything and a plan for nothing. The dots deserved an organiser.":`ثلاثة من كل شيء وخطة للا شيء. النقاط كانت تستحق منظِّمًا.`,"Two minuses make a plus. Two extra clicks make a corpse.":`سالبان يصنعان موجبًا. نقرتان زائدتان تصنعان جثة.`,"Two negatives make a positive. You made a pile.":`نفيان يصنعان إثباتًا. وأنت صنعت كومة.`,"Two puzzles, one clock. The clock won.":`لغزان، مؤقّت واحد. المؤقّت فاز.`,"Two things to remember and one sum. The sum won.":`شيئان للتذكر وعملية جمع واحدة. الجمع فاز.`,"Wrong colour.":`لون خاطئ.`,"You almost trusted the warning. Almost.":`كدت تصدّق التحذير. كدت.`,"You are not a wall. Stop standing there like one.":`أنت لست جدارًا. كفّ عن الوقوف كأنك واحد.`,"You believed a statement I personally told you not to believe.":`صدّقت جملة أخبرتك أنا شخصيًا ألا تصدقها.`,"You can hit an invisible moving target but not a number. Fascinating.":`تستطيع إصابة هدف متحرك خفي لكن ليس رقمًا. مذهل.`,"You carried it across all those levels and dropped it on the doorstep.":`حملته عبر كل تلك المستويات وأسقطته على عتبة الباب.`,"You clicked a button. It said not the buttons.":`نقرت زرًّا. وقد قالت: ليس الأزرار.`,"You clicked a word that NAMES a number. Counting and reading are different jobs.":`نقرت كلمةً تسمّي رقمًا. العدّ والقراءة وظيفتان مختلفتان.`,"You clicked the word, not the shape. The word is flattered. The shape is still sitting there being itself.":`نقرت الكلمة لا الشكل. الكلمة مُطراة. والشكل ما زال جالسًا هناك يكون نفسه.`,"You clicked. The instruction said not to.":`نقرت. والتعليمات قالت لا تفعل.`,"You committed to one button like it was a marriage and left the other standing at the altar.":`ارتبطت بزرّ واحد كأنه زواج وتركت الآخر واقفًا عند المذبح.`,"You did not pick a button. You pressed the whole question. It still counts as a reply.":`لم تختر زرًّا. ضغطت السؤال كله. وهذا يُحسب جوابًا رغم ذلك.`,"You did the maths perfectly and then believed the one sentence you were told not to.":`أنجزت الحساب بإتقان ثم صدّقت الجملة الوحيدة التي قيل لك ألا تصدقها.`,"You did the sum and then couldn’t stop showing off.":`أنجزت الجمع ثم لم تستطع التوقف عن الاستعراض.`,"You died BEFORE the trick. That takes talent.":`مُتّ قبل الخدعة. هذا يتطلب موهبة.`,"You distrusted every label so hard you forgot to trust your eyes.":`شككت في كل الملصقات بشدة حتى نسيت أن تثق بعينيك.`,"You gave it extra, just to be safe. Safety is not a unit of time.":`أعطيته وقتًا إضافيًا، احتياطًا. الاحتياط ليس وحدة زمن.`,"You had eight seconds to spot the difference and clicked none of it.":`كان لديك ثماني ثوانٍ لرصد الفرق ولم تنقر شيئًا.`,"You had it. You had exactly it. And then you wanted more.":`كانت معك. بالضبط كما طُلبت. ثم أردت المزيد.`,"You have clicked past the real one on every single level. It finally took offence.":`تجاوزت الزرّ الحقيقي بالنقر في كل مستوى. وأخيرًا شعر بالإهانة.`,"You held out for a prettier zero. There was only ever one, and it left.":`انتظرت صفرًا أجمل. لم يكن هناك سوى واحد، وقد رحل.`,"You inverted it and then over-inverted your finger.":`عكستَ الجملة ثم عكس إصبعك نفسه زيادة.`,"You left the lines. The lines were the entire idea. They were right there, drawn, glowing.":`تركت الخطوط. الخطوط كانت الفكرة كلها. كانت هناك، مرسومة، متوهجة.`,"You lost the thread somewhere in the middle and finished on a hope. Hope has no parity.":`أضعت الخيط في المنتصف وأنهيت على أمل. والأمل لا زوجية له.`,"You never even set foot on the path.":`لم تطأ المسار أصلًا.`,"You parsed the grammar and then ran out the clock admiring it.":`حلّلت القواعد ثم أنفدت الوقت في الإعجاب بها.`,"You pattern-matched and amputated the front of the sentence. The front was the entire point.":`طابقت النمط وبترت أول الجملة. وأولها كان الفكرة كلها.`,"You reached for the wrong one on instinct. The right number left the building.":`مددت يدك إلى الخطأ بالغريزة. الرقم الصحيح غادر المبنى.`,'You read "1000", did the maths, and surrendered. The maths was not the assignment.':`قرأت «١٠٠٠»، حسبتها، واستسلمت. الحساب لم يكن هو المطلوب.`,"You read every word twice and clicked nothing. Analysis paralysis has a body count now.":`قرأت كل كلمة مرتين ولم تنقر شيئًا. شللُ التحليل صار له ضحايا الآن.`,"You read the badge instead of the seat. The badge is thrilled. The seat never even got looked at.":`قرأت الشارة بدل المقعد. الشارة سعيدة. المقعد لم ينظر إليه أحد.`,"You read what it called itself and believed it on the spot. Paint cannot lie. Ink does little else.":`قرأت ما سمّى به نفسه وصدّقته فورًا. الطلاء لا يكذب. أما الحبر فلا يفعل شيئًا غير ذلك تقريبًا.`,"You rehearsed that digit for three seconds and then reached straight for it like an old friend.":`تدربت على ذلك الرقم ثلاث ثوانٍ ثم مددت يدك إليه مباشرة كصديق قديم.`,"You savored it too long. The button does not age like wine.":`تلذذت به طويلًا. الزرّ لا يَعتُق كالنبيذ.`,"You smashed DENY to guard access that was never at risk.":`ضربت «رفض» لتحمي صلاحيات لم تكن في خطر قط.`,"You smashed NO to protect a record that was never at risk.":`ضربت «لا» لتحمي سجلًا لم يكن في خطر قط.`,"You smashed NO to save a save that was never at risk.":`ضربت «لا» لتنقذ ملف حفظ لم يكن في خطر قط.`,"You stared at a rug for the full clock and never once looked under it.":`حدّقت في السجادة طوال الوقت ولم تنظر تحتها ولو مرة.`,"You stared at the keypad until the clock gave up. The number is still waiting.":`حدّقت في لوحة الأرقام حتى استسلم المؤقّت. الرقم ما زال ينتظر.`,"You stared your own number in the face and blinked.":`حدّقت في رقمك وجهاً لوجه ثم رمشت.`,"You stood there admiring the button while the clock emptied. Hold is a verb. You never conjugated it.":`وقفت تتأمل الزرّ بينما المؤقّت يفرغ. «امسك» فعلُ أمر. وأنت لم تصرّفه.`,"You survived every visit and still miscounted the guest book.":`نجوت من كل زيارة ومع ذلك أخطأت في دفتر الضيوف.`,"You trained yourself so well you forgot to check whether the drill had changed. It had.":`دربت نفسك جيدًا حتى نسيت أن تتحقق إن كان التمرين قد تغيّر. وقد تغيّر.`,"You trusted a caption over a colour. The caption is a sticker. Anyone can print a sticker.":`وثقت بتسمية بدل لون. التسمية ملصق. وأي أحد يستطيع طباعة ملصق.`,"You trusted the caption over your own eyes. The caption is not licensed to practice geometry.":`وثقت بالتسمية بدل عينيك. التسمية لا تملك رخصة لممارسة الهندسة.`,"You trusted the loud one. The loud one lies for a living.":`وثقت بالصاخب. والصاخب يكذب لكسب رزقه.`,"You waited for permission from a button that was never going to give it.":`انتظرت إذنًا من زرّ لم يكن سيعطيه أبدًا.`,"You waited so well you forgot waiting was supposed to end.":`انتظرت ببراعة حتى نسيت أن الانتظار يفترض أن ينتهي.`,"You went fishing for a double that was not there and reeled in one too many.":`ذهبت تصطاد تكرارًا غير موجود وعدت بنقرة زائدة.`,"You went with the first one your eyes landed on. It was not the one.":`اخترت أول ما وقعت عليه عيناك. ولم يكن هو.`,"You were led. By a dot. It drifted, your hand drifted after it, and here we are.":`انقدت. خلف نقطة. انجرفت، فانجرفت يدك خلفها، وها نحن هنا.`,"You were not following the lamp. You were following a little drummer in your head, and he is fired.":`لم تكن تتبع المصباح. كنت تتبع طبّالًا صغيرًا في رأسك، وقد طُرد من عمله.`,"You were there ten seconds ago. The paint was not even dry.":`كنت هناك قبل عشر ثوانٍ. الطلاء لم يجف بعد.`,"Your finger memorized the answer and stopped reading. The word changed. Your hand did not.":`إصبعك حفظ الجواب وتوقف عن القراءة. الكلمة تغيّرت. يدك لم تتغير.`,"Your inner clock runs fast. It always has.":`ساعتك الداخلية تسبق. لطالما كانت كذلك.`,"Zero came and went. You attended the decoy’s funeral instead.":`الصفر جاء ورحل. وأنت حضرت جنازة الطُعم بدلًا منه.`,"Zero clicks. Zero is even. Doing nothing WAS the forbidden thing — the oldest trap in arithmetic, still undefeated.":`صفر نقرات. والصفر زوجي. عدمُ الفعل كان هو الممنوع — أقدم فخ في الحساب، ولا يزال بلا هزيمة.`,"The clock ticks and nobody listens.":`الساعة تدق ولا أحد يصغي.`},ce=[[/^S — Settings\s+H — History\s+P — Pause\s+R — Reset(\s+ESC — Quit)?$/,e=>`S — الإعدادات              H — السجلّ              P — إيقاف مؤقت              R — إعادة${e[1]?`              ESC — خروج`:``}`],[/^LEVEL (\d+)$/,e=>`المستوى ${e[1]}`],[/^RUN #(\d+)$/,e=>`المحاولة ${e[1]}`],[/^BEST — LEVEL (\d+)$/,e=>`الأفضل — المستوى ${e[1]}`],[/^DIED ON LEVEL (\d+) OF (\d+) — BEST: LEVEL (\d+)$/,e=>`مُتّ في المستوى ${e[1]} من ${e[2]} — الأفضل: المستوى ${e[3]}`],[/^b
